services:
  postgres:
    image: postgres:16-alpine
    container_name: news-in-perspective-postgres
    environment:
      POSTGRES_DB: news_in_perspective
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d news_in_perspective"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
